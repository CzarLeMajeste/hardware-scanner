<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hardware Scanner</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <p class="eyebrow">HYBRID LOCAL + SERVER SCAN</p>
        <h1>Hardware Scanner</h1>
        <p>
          Use <strong>Scan my device</strong> for local hardware from Tauri or localhost service,
          and <strong>Scan server</strong> for backend machine inspection.
        </p>

        <div class="controls">
          <label>
            Local scanner URL
            <input id="local-service-url" value="http://127.0.0.1:7878" />
          </label>
          <label>
            Server scanner URL
            <input id="server-service-url" placeholder="https://scanner.example.com" />
          </label>
          <label>
            Server API key
            <input id="server-api-key" type="password" placeholder="x-api-key" />
          </label>
        </div>

        <div class="actions">
          <button id="scan-local-btn" type="button">Scan my device</button>
          <button id="scan-server-btn" type="button" class="secondary">Scan server</button>
        </div>
        <p id="status" class="status">Ready.</p>
      </header>

      <section id="hardware" class="panel hidden"></section>
      <section id="matches" class="matches hidden"></section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
